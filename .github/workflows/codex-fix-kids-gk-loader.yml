name: Fix Kids GK mock test loader

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-fix-kids-gk-loader.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch mock test loader
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('mock-test.html')
          text = path.read_text(encoding='utf-8')

          text = text.replace('const activeFilePath = params.get("file") || "";', 'const activeFilePath = activeTestFilePath();')

          marker = '''function safeTestFilePath(filePath){
  return /^mock-tests\\/[a-z0-9\\-\\/]+\\.json$/i.test(filePath || "");
}
'''
          insert = '''function safeTestFilePath(filePath){
  return /^mock-tests\\/[a-z0-9\\-\\/]+\\.json$/i.test(filePath || "");
}

function legacyFilePathFromSet(setId){
  const kidsGkMatch = /^kids__gk__gk__test-(\\d+)$/i.exec(setId || "");
  if(kidsGkMatch){
    return "mock-tests/kids/gk/test-" + kidsGkMatch[1] + ".json";
  }
  return "";
}

function activeTestFilePath(){
  return params.get("file") || legacyFilePathFromSet(params.get("set")) || "";
}

function normalizeAnswerValue(value){
  if(typeof value === "number") return value;
  if(typeof value === "string"){
    const trimmed = value.trim();
    if(/^[A-D]$/i.test(trimmed)){
      return trimmed.toUpperCase().charCodeAt(0) - 65;
    }
    const numeric = Number(trimmed);
    if(Number.isInteger(numeric)) return numeric;
  }
  return value;
}

function normalizeQuestion(question){
  if(!question) return question;
  return {
    ...question,
    answer:Array.isArray(question.answer)
      ? question.answer.map(normalizeAnswerValue)
      : normalizeAnswerValue(question.answer)
  };
}
'''
          if 'function legacyFilePathFromSet' not in text:
            text = text.replace(marker, insert)

          text = text.replace('questions: raw.questions || []', 'questions: (raw.questions || []).map(normalizeQuestion)')
          text = text.replace('''const originalAnswers = Array.isArray(question.answer)
      ? question.answer.map(Number)
      : [Number(question.answer)];''', '''const originalAnswers = Array.isArray(question.answer)
      ? question.answer.map(normalizeAnswerValue)
      : [normalizeAnswerValue(question.answer)];''')
          text = text.replace('return answers.map(Number).includes(optionIndex);', 'return answers.map(normalizeAnswerValue).includes(optionIndex);')
          text = text.replace('const filePath = params.get("file");', 'const filePath = activeTestFilePath();')
          text = text.replace('file:params.get("file") || "",', 'file:activeTestFilePath(),')

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet -- mock-test.html; then
            echo "No mock-test.html changes needed."
            exit 0
          fi
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add mock-test.html
          git commit -m "Fix Kids GK mock test loader"
          git push
