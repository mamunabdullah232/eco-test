name: Add Kids GK Mock Tests

on:
  push:
    paths:
      - ".codex-kids-gk.py"
      - ".codex-kids-gk-payload.txt"
      - ".github/workflows/codex-kids-gk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-kids-gk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Kids GK tests
        run: python .codex-kids-gk.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Kids GK mock tests" || echo "No changes to commit"
          git push
