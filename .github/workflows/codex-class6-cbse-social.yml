name: Add Class 6 CBSE Social Science Mock Tests

on:
  push:
    paths:
      - ".codex-class6-cbse-social.py"
      - ".codex-class6-cbse-payload-*.txt"
      - ".github/workflows/codex-class6-cbse-social.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-class6-cbse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Class 6 CBSE tests
        run: python .codex-class6-cbse-social.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Class 6 CBSE Social Science mock tests" || echo "No changes to commit"
          git push
