name: Publish Social Science previous year mock tests

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-social-science-final-tests-run.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Add mock-test files and menu entries
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import re

          source = Path('.github/workflows/codex-social-science-final-tests.yml').read_text(encoding='utf-8')
          def extract(name):
              match = re.search(name + r" = '''\n(.*?)\n'''", source, re.S)
              if not match:
                  raise RuntimeError('Missing compressed data for ' + name)
              return match.group(1)
          papers = {
              'hslc-2025-final-social-science-mock-test.json': extract('b64_2025'),
              'hslc-2024-final-social-science-mock-test.json': extract('b64_2024'),
          }
          economics = '''    {
            name:{en:"Economics", as:"অৰ্থনীতি"},
            chapters:[
              {en:"Chapter 1 - Money and Banking", as:"অধ্যায় ১ - মুদ্ৰা আৰু বেংকিং"},
              {en:"Chapter 2 - Economic Development", as:"অধ্যায় ২ - অৰ্থনৈতিক উন্নয়ন"}
            ]
          }'''
          economics_with_papers = economics + ''',
          {
            name:{en:"Mock Test on Previous Year MCQ", as:"পূৰ্বৱৰ্ষৰ MCQ-ভিত্তিক মক টেষ্ট"},
            finalPapers:[
              {
                label:{en:"HSLC 2025 Final Social Science Mock Test", as:"HSLC ২০২৫ চূড়ান্ত সমাজ বিজ্ঞান মক টেষ্ট"},
                file:"mock-tests/class-10/social-science/previous-year-mcq/hslc-2025-final-social-science-mock-test.json"
              },
              {
                label:{en:"HSLC 2024 Final Social Science Mock Test", as:"HSLC ২০২৪ চূড়ান্ত সমাজ বিজ্ঞান মক টেষ্ট"},
                file:"mock-tests/class-10/social-science/previous-year-mcq/hslc-2024-final-social-science-mock-test.json"
              }
            ]
          }'''
          helper_anchor = '''function class10EnglishFinalTestLink(year){
            return "mock-test.html?file=" + encodeURIComponent("mock-tests/class-10/english/hslc-" + year + "-final-english-mcq.json");
          }

          '''
          helper_replacement = helper_anchor + '''function jsonMockTestLink(file){
            return "mock-test.html?file=" + encodeURIComponent(file);
          }

          '''
          old_items = '        items:makeChapterItems(group, subject, chapterGroup)'
          new_items = '''        items:chapterGroup.finalPapers
                  ? chapterGroup.finalPapers.map(paper => ({
                      label:paper.label,
                      href:jsonMockTestLink(paper.file),
                      status:"available",
                      test:true
                    }))
                  : makeChapterItems(group, subject, chapterGroup)'''
          time_anchor = '''function formatTime(seconds){
            const mins = Math.floor(seconds / 60).toString().padStart(2, "0");
            const secs = (seconds % 60).toString().padStart(2, "0");
            return `${mins}:${secs}`;
          }

          '''
          time_replacement = time_anchor + '''function assameseNumber(value){
            const digits = ["০","১","২","৩","৪","৫","৬","৭","৮","৯"];
            return String(value).replace(/\\d/g, digit => digits[Number(digit)]);
          }

          '''
          for prefix in ('', 'xohopathi_home_and_class_test/'):
              folder = Path(prefix) / 'mock-tests/class-10/social-science/previous-year-mcq'
              folder.mkdir(parents=True, exist_ok=True)
              for filename, encoded in papers.items():
                  (folder / filename).write_bytes(gzip.decompress(base64.b64decode(encoded)))
              index_path = Path(prefix) / 'index.html'
              index = index_path.read_text(encoding='utf-8')
              if 'HSLC 2025 Final Social Science Mock Test' not in index:
                  if economics not in index or helper_anchor not in index or old_items not in index:
                      raise RuntimeError('Menu anchor missing from ' + str(index_path))
                  index = index.replace(economics, economics_with_papers, 1)
                  index = index.replace(helper_anchor, helper_replacement, 1)
                  index = index.replace(old_items, new_items, 1)
                  index_path.write_text(index, encoding='utf-8')
              test_path = Path(prefix) / 'mock-test.html'
              html = test_path.read_text(encoding='utf-8')
              if 'function assameseNumber(value)' not in html:
                  if time_anchor not in html:
                      raise RuntimeError('Timer anchor missing from ' + str(test_path))
                  html = html.replace(time_anchor, time_replacement, 1)
                  html = html.replace('  const questionCaption = testSet.englishOnly ? "" : "<span>১০টা প্ৰশ্ন</span>";', '  const questionCaption = testSet.englishOnly ? "" : `<span>${assameseNumber(testSet.questions.length)}টা প্ৰশ্ন</span>`;', 1)
                  html = html.replace('  const minuteCaption = testSet.englishOnly ? "" : "<span>১০ মিনিট</span>";', '  const minuteCaption = testSet.englishOnly ? "" : `<span>${assameseNumber(testSet.durationMinutes)} মিনিট</span>`;', 1)
                  test_path.write_text(html, encoding='utf-8')
          PY
      - name: Commit published site files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/codex-social-science-final-tests.yml
          rm .github/workflows/codex-social-science-final-tests-run.yml
          git add -A
          git commit -m "Add HSLC Social Science previous year mock tests"
          git push
