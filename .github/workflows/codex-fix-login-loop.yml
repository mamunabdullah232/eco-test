name: Run login loop fix patch

on:
  workflow_dispatch:
  push:
    paths:
      - .tmp-fix-login-loop.py
      - .github/workflows/codex-fix-login-loop.yml

permissions:
  contents: write

jobs:
  patch-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python .tmp-fix-login-loop.py
      - name: Validate and commit
        shell: bash
        run: |
          git diff --check
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add index.html login.js .tmp-fix-login-loop.py .github/workflows/codex-fix-login-loop.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix mobile login redirect loop"
            git push
          fi
