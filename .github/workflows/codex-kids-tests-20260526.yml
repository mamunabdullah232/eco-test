name: Add Kids English Grammar Mock Tests

on:
  push:
    paths:
      - '.codex-kids-tests-20260526.py'
      - '.github/workflows/codex-kids-tests-20260526.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-kids-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply Kids mock test update
        run: python .codex-kids-tests-20260526.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html mock-test.html mock-tests/kids/english-grammar/test-1.json mock-tests/kids/english-grammar/test-2.json mock-tests/kids/english-grammar/test-3.json .codex-kids-tests-20260526.py .github/workflows/codex-kids-tests-20260526.yml
          git commit -m "Add Kids English Grammar mock tests" || echo "No changes to commit"
          git push
