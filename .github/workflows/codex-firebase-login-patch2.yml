name: Run Firebase login patch

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-firebase-login-patch2.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Patch existing pages
        run: python .tmp-firebase-login-patch.py
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .tmp-firebase-login-patch.py .github/workflows/codex-firebase-login-patch.yml .github/workflows/codex-firebase-login-patch2.yml
          git add -A
          git commit -m "Integrate Firebase login with English grammar tests"
          git push
