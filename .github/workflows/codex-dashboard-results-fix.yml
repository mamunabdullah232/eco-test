name: Fix dashboard result loading
on:
  push:
    paths:
      - '.codex-dashboard-results-fix.py'
      - '.github/workflows/codex-dashboard-results-fix.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch dashboard result loading
        run: python .codex-dashboard-results-fix.py
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .codex-dashboard-results-fix.py .github/workflows/codex-dashboard-results-fix.yml
          git add firebase-config.js login.js save-attempt.js student-dashboard.js admin-dashboard.js firestore-rules.txt
          git commit -m "Fix dashboard result loading" || echo "No changes to commit"
          git push
