name: Publish HSLC General Mathematics mock test

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-general-maths-2025.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Add General Mathematics mock test and navigation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip

          b64_json = ''''''

          subject_code = '''const class10GeneralMathematics = {
            name:{en:"General Mathematics", as:"সাধাৰণ গণিত"},
            finalPapers:[
              {
                label:{en:"HSLC 2025 Final General Mathematics Mock Test", as:"HSLC ২০২৫ চূড়ান্ত সাধাৰণ গণিত মক টেষ্ট"},
                file:"mock-tests/class-10/general-mathematics/hslc-2025-final-general-mathematics-mcq.json"
              }
            ]
          };
          '''

          subject_final_papers = '''function makeSubjectItems(group, subject){
            if(subject.finalPapers){
              return subject.finalPapers.map(paper => ({
                label:paper.label,
                href:jsonMockTestLink(paper.file),
                status:"available",
                test:true
              }));
            }

            if(subject.chapterGroups){'''

          old_shuffle = '''function shuffleQuestionOptions(set){
            if(!set || !Array.isArray(set.questions)) return set;
            set.questions = set.questions.map(function(question){
              const oldAnswer = Number(question.answer);
              const choices = Array.isArray(question.options)
                ? question.options.map(function(option, index){ return { option, originalIndex:index }; })
                : [];

              if(choices.length < 2 || !Number.isInteger(oldAnswer)){
                return question;
              }

              for(let index = choices.length - 1; index > 0; index -= 1){
                const randomIndex = Math.floor(Math.random() * (index + 1));
                const current = choices[index];
                choices[index] = choices[randomIndex];
                choices[randomIndex] = current;
              }

              const newAnswer = choices.findIndex(function(choice){
                return choice.originalIndex === oldAnswer;
              });

              return {
                ...question,
                options: choices.map(function(choice){ return choice.option; }),
                answer: newAnswer >= 0 ? newAnswer : oldAnswer
              };
            });
            return set;
          }'''

          new_shuffle = '''function shuffleQuestionOptions(set){
            if(!set || !Array.isArray(set.questions)) return set;
            set.questions = set.questions.map(function(question){
              const originalAnswers = Array.isArray(question.answer)
                ? question.answer.map(Number)
                : [Number(question.answer)];
              const choices = Array.isArray(question.options)
                ? question.options.map(function(option, index){ return { option, originalIndex:index }; })
                : [];

              if(choices.length < 2 || originalAnswers.some(function(answer){ return !Number.isInteger(answer); })){
                return question;
              }

              for(let index = choices.length - 1; index > 0; index -= 1){
                const randomIndex = Math.floor(Math.random() * (index + 1));
                const current = choices[index];
                choices[index] = choices[randomIndex];
                choices[randomIndex] = current;
              }

              const newAnswers = originalAnswers.map(function(oldAnswer){
                return choices.findIndex(function(choice){
                  return choice.originalIndex === oldAnswer;
                });
              }).filter(function(answer){ return answer >= 0; });

              const normalizedAnswers = newAnswers.length ? newAnswers : originalAnswers;

              return {
                ...question,
                options: choices.map(function(choice){ return choice.option; }),
                answer:Array.isArray(question.answer) ? normalizedAnswers : normalizedAnswers[0]
              };
            });
            return set;
          }

          function isCorrectAnswer(question, optionIndex){
            const answers = Array.isArray(question.answer) ? question.answer : [question.answer];
            return answers.map(Number).includes(optionIndex);
          }'''

          for prefix in ('', 'xohopathi_home_and_class_test/'):
            json_path = Path(prefix) / 'mock-tests/class-10/general-mathematics/hslc-2025-final-general-mathematics-mcq.json'
            json_path.parent.mkdir(parents=True, exist_ok=True)
            json_path.write_bytes(gzip.decompress(base64.b64decode(b64_json)))

            index_path = Path(prefix) / 'index.html'
            index = index_path.read_text(encoding='utf-8')
            if 'class10GeneralMathematics' not in index:
              anchor = 'const class9SocialScience = {\n'
              if anchor not in index:
                raise RuntimeError('Class 9 anchor missing in ' + str(index_path))
              index = index.replace(anchor, subject_code + anchor, 1)
            index = index.replace('      ? [juniorMockSubjects[0], class10SocialScience]\n', '      ? [juniorMockSubjects[0], class10GeneralMathematics, class10SocialScience]\n', 1)
            if 'if(subject.finalPapers){\n    return subject.finalPapers.map' not in index and 'if(subject.finalPapers){\n              return subject.finalPapers.map' not in index:
              anchor = 'function makeSubjectItems(group, subject){\n  if(subject.chapterGroups){'
              if anchor not in index:
                raise RuntimeError('Subject items anchor missing in ' + str(index_path))
              index = index.replace(anchor, subject_final_papers, 1)
            index_path.write_text(index, encoding='utf-8')

            quiz_path = Path(prefix) / 'mock-test.html'
            quiz = quiz_path.read_text(encoding='utf-8')
            if 'function isCorrectAnswer(question, optionIndex)' not in quiz:
              if old_shuffle not in quiz:
                raise RuntimeError('Shuffle anchor missing in ' + str(quiz_path))
              quiz = quiz.replace(old_shuffle, new_shuffle, 1)
              quiz = quiz.replace('submitted && optionIndex === question.answer', 'submitted && isCorrectAnswer(question, optionIndex)', 1)
              quiz = quiz.replace('submitted && answers[qIndex] === optionIndex && answers[qIndex] !== question.answer', 'submitted && answers[qIndex] === optionIndex && !isCorrectAnswer(question, answers[qIndex])', 1)
              quiz = quiz.replace('}else if(answers[index] === question.answer){', '}else if(isCorrectAnswer(question, answers[index])){', 1)
            quiz_path.write_text(quiz, encoding='utf-8')
          PY
      - name: Commit published files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/codex-general-maths-2025.yml
          git add -A
          git commit -m "Add HSLC General Mathematics final mock test"
          git push
