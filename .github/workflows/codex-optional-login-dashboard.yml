name: Run optional login dashboard patch

on:
  workflow_dispatch:
  push:
    paths:
      - .tmp-optional-login-dashboard.py
      - .github/workflows/codex-optional-login-dashboard.yml

permissions:
  contents: write

jobs:
  patch-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch
        run: python .tmp-optional-login-dashboard.py
      - name: Validate and commit
        shell: bash
        run: |
          git diff --check
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add index.html mock-test.html firebase-config.js login.html login.js student-dashboard.html save-attempt.js .tmp-optional-login-dashboard.py .github/workflows/codex-optional-login-dashboard.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Make login dashboard optional"
            git push
          fi
