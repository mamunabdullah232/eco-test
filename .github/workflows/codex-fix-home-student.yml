name: Fix home and student corner
on:
  push:
    paths:
      - '.codex-fix-home-student.py'
      - '.github/workflows/codex-fix-home-student.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch site files
        run: python .codex-fix-home-student.py
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .codex-fix-home-student.py .github/workflows/codex-fix-home-student.yml
          git add index.html xohopathi_home_and_class_test/index.html || true
          git commit -m "Clean routine and restore class test" || echo "No changes to commit"
          git push
