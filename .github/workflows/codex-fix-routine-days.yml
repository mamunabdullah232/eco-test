name: Fix routine day dropdown

on:
  push:
    paths:
      - '.codex-fix-routine-days.py'
      - '.github/workflows/codex-fix-routine-days.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-days:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch routine day options
        run: python .codex-fix-routine-days.py
      - name: Commit patched files and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .codex-fix-routine-days.py .github/workflows/codex-fix-routine-days.yml
          git add index.html xohopathi_home_and_class_test/index.html
          git commit -m "Show all routine day options" || echo "No changes to commit"
          git push
