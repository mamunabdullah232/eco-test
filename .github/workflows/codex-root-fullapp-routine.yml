name: Promote full app and update routine

on:
  push:
    paths:
      - '.codex-root-fullapp-routine.py'
      - '.github/workflows/codex-root-fullapp-routine.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app and root index
        run: python .codex-root-fullapp-routine.py
      - name: Commit patched files and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .codex-root-fullapp-routine.py .github/workflows/codex-root-fullapp-routine.yml
          git add index.html xohopathi_home_and_class_test/index.html
          git commit -m "Promote full app to root and update routine" || echo "No changes to commit"
          git push
