name: Apply dashboard and routine updates

on:
  push:
    paths:
      - '.codex-dashboard-routine-update.py'
      - '.github/workflows/codex-dashboard-routine-update.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch full Xohopathi app
        run: python .codex-dashboard-routine-update.py
      - name: Commit patched files and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .codex-dashboard-routine-update.py .github/workflows/codex-dashboard-routine-update.yml
          git add xohopathi_home_and_class_test/index.html
          git commit -m "Update full app dashboard facts and routine" || echo "No changes to commit"
          git push
