name: Publish Class 10 English grammar tests

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-english-grammar-tests.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Add grammar tests and connect menu
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, zipfile, io, shutil

          zip_b64 = ''''''

          grammar_zip = zipfile.ZipFile(io.BytesIO(base64.b64decode(zip_b64)))
          for prefix in ('', 'xohopathi_home_and_class_test/'):
            target = Path(prefix) / 'mock-tests/class-10/english/grammar'
            target.mkdir(parents=True, exist_ok=True)
            for member in grammar_zip.namelist():
              if member.endswith('.json'):
                (target / Path(member).name).write_bytes(grammar_zip.read(member))

            index_path = Path(prefix) / 'index.html'
            index = index_path.read_text(encoding='utf-8')
            if 'const grammarTestNames' not in index:
              index = index.replace('const materialTopics = [', 'const grammarTestNames = Array.from({length:10}, function(_, index){\n  return {en:"Test " + (index + 1), as:"টেষ্ট " + (index + 1)};\n});\nconst materialTopics = [', 1)
            if 'function isClass10EnglishGrammarSection(parts)' not in index:
              index = index.replace('function class10EnglishFinalTestLink(year){', 'function isClass10EnglishGrammarSection(parts){\n  return parts.map(slugify).join("__") === "class-10__english__grammar";\n}\n\nfunction class10EnglishFinalTestLink(year){', 1)
            if 'function class10EnglishGrammarTestFile(test)' not in index:
              index = index.replace('function nestedTestLink(parts, test){', 'function class10EnglishGrammarTestFile(test){\n  return "mock-tests/class-10/english/grammar/test" + getNumberFromLabel(test) + ".json";\n}\n\nfunction nestedTestLink(parts, test){', 1)
            if 'class10EnglishGrammarTestFile(test)' in index and 'isClass10EnglishGrammarSection(parts)){\n    return "mock-test.html?file=" + encodeURIComponent(class10EnglishGrammarTestFile(test));' not in index:
              index = index.replace('  return "mock-test.html?set=" + encodeURIComponent(mockSetId(parts, test));', '  if(isClass10EnglishGrammarSection(parts)){\n    return "mock-test.html?file=" + encodeURIComponent(class10EnglishGrammarTestFile(test));\n  }\n  return "mock-test.html?set=" + encodeURIComponent(mockSetId(parts, test));', 1)
            if 'return /^Test ([1-9]|10)$/.test(labelEn(test));' not in index:
              index = index.replace('  return false;\n}\n\nfunction renderTestLinks(parts){', '  if(isClass10EnglishGrammarSection(parts)){\n    return /^Test ([1-9]|10)$/.test(labelEn(test));\n  }\n  return false;\n}\n\nfunction renderTestLinks(parts){', 1)
            if 'const levelTestNames = isClass10EnglishGrammarSection(parts) ? grammarTestNames : testNames;' not in index:
              index = index.replace('function makeTestLevel(title, parts){\n  const tests = testNames.map(test => ({', 'function makeTestLevel(title, parts){\n  const levelTestNames = isClass10EnglishGrammarSection(parts) ? grammarTestNames : testNames;\n  const tests = levelTestNames.map(test => ({', 1)
            index_path.write_text(index, encoding='utf-8')
          PY
      - name: Commit published files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/codex-english-grammar-tests.yml
          git add -A
          git commit -m "Add Class 10 English grammar mock tests"
          git push
