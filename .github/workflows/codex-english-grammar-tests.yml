name: Publish Class 10 English grammar tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-english-grammar-tests.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Add grammar tests and connect menu
        shell: bash
        run: |
          set -euo pipefail
          base64 -d english-grammar-tests.b64 > grammar.zip
          python - <<'PY'
          from pathlib import Path
          import zipfile

          def patch_index(path):
              if not path.exists():
                  return
              text = path.read_text(encoding='utf-8')
              if 'const grammarTestNames' not in text:
                  text = text.replace(
                      'const materialTopics = [',
                      'const grammarTestNames = Array.from({length:10}, function(_, index){\n'
                      '  return {en:"Test " + (index + 1), as:"টেষ্ট " + (index + 1)};\n'
                      '});\n'
                      'const materialTopics = [',
                      1
                  )
              if 'function isClass10EnglishGrammarSection(parts)' not in text:
                  text = text.replace(
                      'function class10EnglishFinalTestLink(year){',
                      'function isClass10EnglishGrammarSection(parts){\n'
                      '  return parts.map(slugify).join("__") === "class-10__english__grammar";\n'
                      '}\n\n'
                      'function class10EnglishFinalTestLink(year){',
                      1
                  )
              if 'function class10EnglishGrammarTestFile(test)' not in text:
                  text = text.replace(
                      'function nestedTestLink(parts, test){',
                      'function class10EnglishGrammarTestFile(test){\n'
                      '  return "mock-tests/class-10/english/grammar/test" + getNumberFromLabel(test) + ".json";\n'
                      '}\n\n'
                      'function nestedTestLink(parts, test){',
                      1
                  )
              grammar_link = '  if(isClass10EnglishGrammarSection(parts)){\n    return "mock-test.html?file=" + encodeURIComponent(class10EnglishGrammarTestFile(test));\n  }\n'
              if 'class10EnglishGrammarTestFile(test)' in text and grammar_link not in text:
                  text = text.replace(
                      '  return "mock-test.html?set=" + encodeURIComponent(mockSetId(parts, test));',
                      grammar_link + '  return "mock-test.html?set=" + encodeURIComponent(mockSetId(parts, test));',
                      1
                  )
              grammar_available = '  if(isClass10EnglishGrammarSection(parts)){\n    return /^Test ([1-9]|10)$/.test(labelEn(test));\n  }\n'
              if grammar_available not in text:
                  text = text.replace(
                      '  return false;\n}\n\nfunction renderTestLinks(parts){',
                      grammar_available + '  return false;\n}\n\nfunction renderTestLinks(parts){',
                      1
                  )
              if 'const levelTestNames = isClass10EnglishGrammarSection(parts) ? grammarTestNames : testNames;' not in text:
                  text = text.replace(
                      'function makeTestLevel(title, parts){\n  const tests = testNames.map(test => ({',
                      'function makeTestLevel(title, parts){\n  const levelTestNames = isClass10EnglishGrammarSection(parts) ? grammarTestNames : testNames;\n  const tests = levelTestNames.map(test => ({',
                      1
                  )
              path.write_text(text, encoding='utf-8')

          with zipfile.ZipFile('grammar.zip') as zf:
              names = [n for n in zf.namelist() if n.endswith('.json')]
              for prefix in ('', 'xohopathi_home_and_class_test/'):
                  target = Path(prefix) / 'mock-tests/class-10/english/grammar'
                  target.mkdir(parents=True, exist_ok=True)
                  for name in names:
                      (target / Path(name).name).write_bytes(zf.read(name))
                  patch_index(Path(prefix) / 'index.html')
          PY
      - name: Commit published files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f grammar.zip english-grammar-tests.b64 .github/workflows/codex-english-grammar-tests.yml
          git add -A
          git commit -m "Add Class 10 English grammar mock tests"
          git push
