<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mock Test | Xohopathi</title>
<style>
:root{
  --blue:#2563eb;
  --green:#15803d;
  --orange:#c2410c;
  --rose:#be123c;
  --ink:#0f172a;
  --text:#1f2937;
  --muted:#64748b;
  --bg:#f8fafc;
  --surface:#fff;
  --border:#e2e8f0;
  --shadow:0 14px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(135deg,#eff6ff 0%,#fff7ed 55%,#ecfdf5 100%);
  color:var(--text);
  line-height:1.6;
}
a{text-decoration:none;color:inherit}
.container{width:min(980px,92%);margin:0 auto}
header{
  background:rgba(255,255,255,.98);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}
.topbar{
  min-height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  color:var(--ink);
}
.mark{
  width:42px;
  height:42px;
  border-radius:13px;
  background:linear-gradient(135deg,var(--blue),#0f766e);
  color:#fff;
  display:grid;
  place-items:center;
}
.back{
  color:var(--blue);
  font-weight:900;
}
main{padding:30px 0 44px}
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.test-head{
  padding:24px;
  border-top:7px solid transparent;
  border-image:linear-gradient(90deg,var(--blue),var(--green),var(--orange),var(--rose)) 1;
  background:linear-gradient(135deg,#fff 0%,#f8fbff 60%,#fff7ed 100%);
}
.kicker{
  color:var(--blue);
  font-size:.82rem;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:8px;
}
h1{
  color:var(--ink);
  font-size:clamp(1.6rem,3.5vw,2.45rem);
  line-height:1.12;
  margin-bottom:10px;
}
.subline{color:var(--muted);font-weight:800}
.controls{
  padding:18px 24px;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
}
.language{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  font-weight:900;
}
.language label{
  display:inline-flex;
  align-items:center;
  gap:7px;
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 11px;
  cursor:pointer;
}
.timer{
  color:#991b1b;
  background:#fee2e2;
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
}
.content{padding:24px}
.start-card{
  display:grid;
  gap:14px;
}
.rules{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.rule{
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  background:#f8fafc;
}
.rule strong{display:block;color:var(--ink)}
.rule span{display:block;color:var(--muted);font-size:.9rem;margin-top:3px}
.btn{
  border:0;
  background:var(--blue);
  color:#fff;
  min-height:44px;
  padding:10px 16px;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
  justify-self:start;
}
.btn.secondary{background:#0f766e}
.questions{display:grid;gap:18px}
.question-card{
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  background:#fff;
  box-shadow:0 8px 18px rgba(15,23,42,.045);
}
.question-title{
  color:var(--ink);
  font-weight:900;
  margin-bottom:12px;
}
.options{display:grid;gap:9px}
.option{
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 12px;
  display:flex;
  gap:9px;
  align-items:flex-start;
  cursor:pointer;
  background:#f8fafc;
}
.option.correct{border-color:#16a34a;background:#dcfce7}
.option.wrong{border-color:#dc2626;background:#fee2e2}
.actions{
  margin-top:20px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.result{
  margin-bottom:18px;
  border:1px solid #bbf7d0;
  background:#ecfdf5;
  color:#14532d;
  border-radius:16px;
  padding:16px;
  font-weight:900;
}
.missing{
  border:1px solid #fed7aa;
  background:#fff7ed;
  color:#9a3412;
  border-radius:16px;
  padding:16px;
  font-weight:900;
}

.explanation{
  margin-top:14px;
  border:1px solid #bae6fd;
  background:linear-gradient(135deg,#f0f9ff 0%,#fff7ed 100%);
  border-radius:14px;
  padding:12px 13px;
  color:#0f172a;
}
.explanation-title{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 9px;
  border-radius:999px;
  background:#dbeafe;
  color:#1d4ed8;
  font-size:.86rem;
  font-weight:900;
}
.explanation p{margin-top:8px;color:#334155;font-weight:700}
body.kid-mode{
  background:linear-gradient(135deg,#fff7ad 0%,#e0f2fe 34%,#fce7f3 68%,#dcfce7 100%);
}
body.kid-mode .panel{border:2px solid #facc15;box-shadow:0 18px 38px rgba(249,115,22,.16)}
body.kid-mode .test-head{background:linear-gradient(135deg,#fff7ed 0%,#ecfeff 48%,#fdf2f8 100%)}
body.kid-mode .kicker{color:#be123c}
body.kid-mode .question-card{border:2px solid #bfdbfe;background:linear-gradient(135deg,#ffffff 0%,#f8fbff 100%)}
body.kid-mode .question-card:nth-child(4n+1){border-color:#fed7aa}
body.kid-mode .question-card:nth-child(4n+2){border-color:#bbf7d0}
body.kid-mode .question-card:nth-child(4n+3){border-color:#fbcfe8}
body.kid-mode .btn{background:linear-gradient(135deg,#f97316,#2563eb)}
body.kid-mode .timer{background:#fef3c7;color:#92400e}

@media(max-width:680px){
  .topbar{align-items:flex-start;flex-direction:column;padding:12px 0}
  .controls{align-items:flex-start}
  .rules{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="container topbar">
    <a class="brand" href="index.html#mock-tests"><span class="mark">X</span><span>Xohopathi Mock Test</span></a>
    <a class="back" id="backLink" href="index.html#mock-tests">Back to Mock Test / মক টেষ্টলৈ উভতি যাওক</a>
  </div>
</header>

<main>
  <div class="container">
    <section class="panel">
      <div class="test-head">
        <div class="kicker" id="testKicker">Class 10 Social Science / শ্ৰেণী ১০ সমাজ বিজ্ঞান</div>
        <h1 id="testTitle">Mock Test</h1>
        <div class="subline" id="testMeta">Loading...</div>
      </div>
      <div class="controls">
        <div class="language" id="languageControls" aria-label="Choose medium">
          <span>Medium / মাধ্যম:</span>
          <label><input type="radio" name="medium" value="en" checked> English</label>
          <label><input type="radio" name="medium" value="as"> Assamese / অসমীয়া</label>
        </div>
        <div class="timer" id="timer">10:00</div>
      </div>
      <div class="content" id="content"></div>
    </section>
  </div>
</main>

<script src="mock-test-data.js"></script>
<script>
const params = new URLSearchParams(location.search);
const activeFilePath = params.get("file") || "";
if(activeFilePath.includes("mock-tests/kids/")){
  document.body.classList.add("kid-mode");
}
let testSet = null;
const content = document.getElementById("content");
const timer = document.getElementById("timer");
let selectedMedium = "en";
let answers = {};
let started = false;
let submitted = false;
let remainingSeconds = 600;
let timerHandle = null;

function isEnglishGrammarTest(){
  const filePath = params.get("file") || "";
  return filePath.includes("mock-tests/class-10/english/grammar/") || filePath.includes("mock-tests/kids/english-grammar/");
}

function safeTestFilePath(filePath){
  return /^mock-tests\/[a-z0-9\-\/]+\.json$/i.test(filePath || "");
}

function normalizeTestSet(raw){
  if(!raw) return null;
  return {
    className: raw.className || { en:"Class 10", as:"শ্ৰেণী ১০" },
    subject: raw.subject || { en:"Social Science", as:"সমাজ বিজ্ঞান" },
    section: raw.section || { en:"Geography", as:"ভূগোল" },
    chapter: raw.chapter || raw.title || { en:"Chapter", as:"অধ্যায়" },
    test: raw.test || { en:"Test", as:"টেষ্ট" },
    displayTitle: raw.displayTitle || "",
    englishOnly: raw.englishOnly === true,
    durationMinutes: raw.durationMinutes || 10,
    correctMarks: raw.correctMarks ?? 1,
    wrongMarks: raw.wrongMarks ?? -0.25,
    questions: raw.questions || []
  };
}

function shuffleQuestionOptions(set){
  if(!set || !Array.isArray(set.questions)) return set;
  set.questions = set.questions.map(function(question){
    const originalAnswers = Array.isArray(question.answer)
      ? question.answer.map(Number)
      : [Number(question.answer)];
    const choices = Array.isArray(question.options)
      ? question.options.map(function(option, index){ return { option, originalIndex:index }; })
      : [];

    if(choices.length < 2 || originalAnswers.some(function(answer){ return !Number.isInteger(answer); })){
      return question;
    }

    for(let index = choices.length - 1; index > 0; index -= 1){
      const randomIndex = Math.floor(Math.random() * (index + 1));
      const current = choices[index];
      choices[index] = choices[randomIndex];
      choices[randomIndex] = current;
    }

    const newAnswers = originalAnswers.map(function(oldAnswer){
      return choices.findIndex(function(choice){
        return choice.originalIndex === oldAnswer;
      });
    }).filter(function(answer){ return answer >= 0; });

    const normalizedAnswers = newAnswers.length ? newAnswers : originalAnswers;

    return {
      ...question,
      options: choices.map(function(choice){ return choice.option; }),
      answer:Array.isArray(question.answer) ? normalizedAnswers : normalizedAnswers[0]
    };
  });
  return set;
}

function isCorrectAnswer(question, optionIndex){
  const answers = Array.isArray(question.answer) ? question.answer : [question.answer];
  return answers.map(Number).includes(optionIndex);
}

async function loadTestSet(){
  const filePath = params.get("file");
  if(filePath){
    if(!safeTestFilePath(filePath)) return;
    try{
      const response = await fetch(filePath, { cache:"no-store" });
      if(!response.ok) return;
      testSet = shuffleQuestionOptions(normalizeTestSet(await response.json()));
    }catch(error){
      console.error("Could not load test file:", error);
    }
    return;
  }
  testSet = shuffleQuestionOptions(normalizeTestSet(window.XOHOPATHI_TESTS && window.XOHOPATHI_TESTS[params.get("set")]));
}

function text(value){
  if(!value) return "";
  return typeof value === "string" ? value : value[selectedMedium] || value.en || "";
}

function escapeHTML(value){
  return String(value).replace(/[&<>"']/g, char => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[char]));
}

function label(value){
  return escapeHTML(text(value));
}

function renderExplanation(question){
  if(!submitted || !question.explanation) return "";
  const explanation = question.explanation;
  const english = typeof explanation === "string" ? explanation : explanation.en || "";
  const assamese = typeof explanation === "string" ? "" : explanation.as || "";
  return `
    <div class="explanation">
      <span class="explanation-title">Explanation / ব্যাখ্যা</span>
      ${english ? `<p><strong>English:</strong> ${escapeHTML(english)}</p>` : ""}
      ${assamese ? `<p><strong>অসমীয়া:</strong> ${escapeHTML(assamese)}</p>` : ""}
    </div>
  `;
}

function setHeader(){
  if(!testSet){
    document.getElementById("testTitle").textContent = "Test not available";
    document.getElementById("testMeta").textContent = "This test set is coming soon.";
    timer.textContent = "--:--";
    content.innerHTML = '<div class="missing">This test is not available yet. / এই টেষ্ট এতিয়াও উপলব্ধ নহয়।</div>';
    return;
  }
  if(testSet.englishOnly){
    selectedMedium = "en";
    document.getElementById("backLink").textContent = "Back to Mock Test";
    document.getElementById("languageControls").innerHTML = "<span>Language:</span><strong>English only</strong>";
  }
  document.getElementById("testKicker").textContent = `${text(testSet.className)} ${text(testSet.subject)}`;
  document.title = text(testSet.test) + " | Xohopathi";
  document.getElementById("testTitle").textContent = testSet.displayTitle || `${text(testSet.chapter)} - ${text(testSet.test)}`;
  document.getElementById("testMeta").textContent =
    `${text(testSet.className)} | ${text(testSet.subject)} | ${text(testSet.section)} | ${testSet.questions.length} Questions | +${testSet.correctMarks} correct, ${testSet.wrongMarks} wrong | ${testSet.durationMinutes} minutes`;
  if(!started){
    timer.textContent = formatTime(testSet.durationMinutes * 60);
  }
}

function formatTime(seconds){
  const mins = Math.floor(seconds / 60).toString().padStart(2, "0");
  const secs = (seconds % 60).toString().padStart(2, "0");
  return `${mins}:${secs}`;
}

function assameseNumber(value){
  const digits = ["০","১","২","৩","৪","৫","৬","৭","৮","৯"];
  return String(value).replace(/\d/g, digit => digits[Number(digit)]);
}

function updateTimer(){
  timer.textContent = formatTime(remainingSeconds);
  if(remainingSeconds <= 0){
    submitTest(true);
    return;
  }
  remainingSeconds -= 1;
}

function startTimer(){
  clearInterval(timerHandle);
  remainingSeconds = testSet.durationMinutes * 60;
  updateTimer();
  timerHandle = setInterval(updateTimer, 1000);
}

function renderStart(){
  const questionCaption = testSet.englishOnly ? "" : `<span>${assameseNumber(testSet.questions.length)}টা প্ৰশ্ন</span>`;
  const minuteCaption = testSet.englishOnly ? "" : `<span>${assameseNumber(testSet.durationMinutes)} মিনিট</span>`;
  const markingCaption = testSet.englishOnly ? "" : "<span>শুদ্ধত +১, ভুলত -০.২৫</span>";
  const startButtonLabel = testSet.englishOnly ? "Start Test" : "Start Test / টেষ্ট আৰম্ভ কৰক";
  content.innerHTML = `
    <div class="start-card">
      <div class="rules">
        <div class="rule"><strong>${testSet.questions.length} Questions</strong>${questionCaption}</div>
        <div class="rule"><strong>${testSet.durationMinutes} Minutes</strong>${minuteCaption}</div>
        <div class="rule"><strong>+${testSet.correctMarks} / ${testSet.wrongMarks}</strong>${markingCaption}</div>
      </div>
      <button class="btn" type="button" id="startBtn">${startButtonLabel}</button>
    </div>
  `;
  document.getElementById("startBtn").addEventListener("click", startTest);
}

function startTest(){
  started = true;
  submitted = false;
  answers = {};
  startTimer();
  renderQuestions();
}

function renderQuestions(){
  const resultHTML = submitted ? renderResult() : "";
  const questionHTML = testSet.questions.map((question, qIndex) => `
    <div class="question-card">
      <div class="question-title">${qIndex + 1}. ${label(question)}</div>
      <div class="options">
        ${question.options.map((option, optionIndex) => {
          const checked = answers[qIndex] === optionIndex ? "checked" : "";
          const resultClass = submitted && isCorrectAnswer(question, optionIndex)
            ? " correct"
            : submitted && answers[qIndex] === optionIndex && !isCorrectAnswer(question, answers[qIndex])
              ? " wrong"
              : "";
          return `
            <label class="option${resultClass}">
              <input type="radio" name="q${qIndex}" value="${optionIndex}" ${checked} ${submitted ? "disabled" : ""}>
              <span>${String.fromCharCode(65 + optionIndex)}. ${label(option)}</span>
            </label>
          `;
        }).join("")}
      </div>
      ${renderExplanation(question)}
    </div>
  `).join("");

  content.innerHTML = `
    ${resultHTML}
    <div class="questions">${questionHTML}</div>
    <div class="actions">
      ${submitted
        ? `<a class="btn secondary" href="index.html#mock-tests">${testSet.englishOnly ? "Back" : "Back / উভতি যাওক"}</a>`
        : `<button class="btn" type="button" id="submitBtn">${testSet.englishOnly ? "Submit Test" : "Submit Test / জমা দিয়ক"}</button>`}
    </div>
  `;

  if(!submitted){
    content.querySelectorAll("input[type='radio']").forEach(input => {
      input.addEventListener("change", event => {
        const index = Number(event.target.name.replace("q", ""));
        answers[index] = Number(event.target.value);
      });
    });
    document.getElementById("submitBtn").addEventListener("click", () => submitTest(false));
  }
}

function calculateResult(){
  let correct = 0;
  let wrong = 0;
  let unanswered = 0;
  testSet.questions.forEach((question, index) => {
    if(answers[index] === undefined){
      unanswered += 1;
    }else if(isCorrectAnswer(question, answers[index])){
      correct += 1;
    }else{
      wrong += 1;
    }
  });
  const score = correct * testSet.correctMarks + wrong * testSet.wrongMarks;
  return { correct, wrong, unanswered, score };
}

function renderResult(){
  const result = calculateResult();
  if(testSet.englishOnly){
    return `
      <div class="result">
        Result: Score ${result.score.toFixed(2)} |
        Correct ${result.correct} |
        Wrong ${result.wrong} |
        Unanswered ${result.unanswered}
      </div>
    `;
  }
  return `
    <div class="result">
      Result / ফলাফল: Score ${result.score.toFixed(2)} |
      Correct ${result.correct} |
      Wrong ${result.wrong} |
      Unanswered ${result.unanswered}
    </div>
  `;
}

function currentTestId(){
  const filePath = params.get("file") || params.get("set") || "";
  const match = filePath.match(/([^/]+)\.json$/);
  return match ? match[1] : filePath || "test";
}

async function saveAttemptResult(result, autoSubmitted){
  if(typeof window.saveXohopathiAttempt !== "function") return;
  const selectedAnswers = testSet.questions.map((question, index) => {
    if(answers[index] === undefined) return null;
    const option = question.options[answers[index]];
    return {
      questionNumber:index + 1,
      selectedIndex:answers[index],
      selectedText:typeof option === "string" ? option : text(option),
      correct:isCorrectAnswer(question, answers[index])
    };
  });
  const correctAnswers = testSet.questions.map((question, index) => ({
    questionNumber:index + 1,
    answer:question.answer
  }));
  try{
    const saveInfo = await window.saveXohopathiAttempt({
      className:text(testSet.className) || "Class 10",
      subject:text(testSet.subject) || "English",
      topic:text(testSet.section) || "Grammar",
      testId:currentTestId(),
      testTitle:document.title || "Class 10 English Grammar Test",
      score:Number(result.score.toFixed(2)),
      totalQuestions:testSet.questions.length,
      answers:selectedAnswers,
      correctAnswers,
      extra:{
        autoSubmitted,
        file:params.get("file") || "",
        correct:result.correct,
        wrong:result.wrong,
        unanswered:result.unanswered
      }
    });
    const resultBox = content.querySelector(".result");
    if(resultBox && saveInfo && saveInfo.saved){
      resultBox.insertAdjacentHTML("beforeend", "<br><span>Attempt saved to dashboard.</span>");
    }
  }catch(error){
    console.error("Could not save attempt:", error);
    const resultBox = content.querySelector(".result");
    if(resultBox){
      resultBox.insertAdjacentHTML("beforeend", "<br><span>Attempt could not be saved. Please check login and Firestore rules.</span>");
    }
  }
}

async function submitTest(autoSubmitted){
  if(submitted) return;
  submitted = true;
  clearInterval(timerHandle);
  if(autoSubmitted) timer.textContent = "00:00";
  const result = calculateResult();
  renderQuestions();
  await saveAttemptResult(result, autoSubmitted);
}

document.querySelectorAll("input[name='medium']").forEach(input => {
  input.addEventListener("change", event => {
    selectedMedium = event.target.value;
    setHeader();
    if(!testSet) return;
    if(started) renderQuestions();
  });
});

loadTestSet().then(function(){
  setHeader();
  if(testSet){
    renderStart();
  }
});
</script>
<script type="module" src="/save-attempt.js"></script>
</body>
</html>
