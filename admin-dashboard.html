<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xohopathi Admin Dashboard</title>
  <style>
    :root{--primary:#2563eb;--dark:#0f172a;--muted:#64748b;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--danger:#b91c1c}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--dark)}
    header{background:#fff;border-bottom:1px solid var(--border);padding:18px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px}
    h1,h2{margin:0}
    main{max-width:1250px;margin:0 auto;padding:28px 18px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:0 10px 28px rgba(15,23,42,.06);overflow-x:auto}
    .muted{color:var(--muted)}
    .danger{color:var(--danger);font-weight:700}
    .btn{border:0;border-radius:12px;padding:11px 14px;background:var(--primary);color:white;text-decoration:none;font-weight:700;cursor:pointer}
    .btn.secondary{background:#e2e8f0;color:var(--dark)}
    table{width:100%;border-collapse:collapse;margin-top:14px;min-width:880px}
    th,td{text-align:left;border-bottom:1px solid var(--border);padding:10px 8px;font-size:14px;vertical-align:top}
    th{color:var(--muted)}
    pre{white-space:pre-wrap;max-width:260px;margin:0}
    .top-actions{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  </style>
</head>
<body>
  <header><div><h1>Admin Dashboard</h1><div class="muted" id="adminInfo">Loading...</div></div><div class="top-actions"><a class="btn secondary" href="./xohopathi_home_and_class_test/index.html">Home</a><button class="btn secondary" id="logoutBtn">Logout</button></div></header>
  <main><section class="card"><div class="top-actions"><div><h2>All Student Test Attempts</h2><div class="muted">Only the admin Gmail can view this page.</div></div><button class="btn" id="refreshBtn">Refresh</button></div><div id="adminArea" class="muted">Loading results...</div></section></main>
  <script type="module" src="./admin-dashboard.js"></script>
</body>
</html>
