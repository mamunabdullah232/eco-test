<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Plant Details | Xohopathi Plantation Drive</title>
<style>
:root{
  --green:#15803d;
  --deep:#064e3b;
  --leaf:#dcfce7;
  --sky:#e0f2fe;
  --pink:#fce7f3;
  --amber:#fef3c7;
  --ink:#10251f;
  --muted:#52655e;
  --line:#d8e5dc;
  --surface:#fff;
  --bg:#f2f8f3;
  --shadow:0 18px 42px rgba(6,78,59,.11);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--ink);
  font-family:Arial,Helvetica,sans-serif;
}
.topbar{
  min-height:70px;
  display:flex;
  align-items:center;
  padding:12px max(18px,calc((100% - 920px) / 2));
  background:#fff;
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:11px;font-weight:900;color:var(--ink)}
.mark{
  width:44px;
  height:44px;
  border-radius:12px;
  display:grid;
  place-items:center;
  color:#fff;
  font-size:1.3rem;
  background:linear-gradient(135deg,var(--green),#0284c7);
}
.brand small{display:block;margin-top:2px;color:var(--muted);font-weight:700}
main{width:min(920px,calc(100% - 28px));margin:28px auto;padding-bottom:28px}
.plant-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:16px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.cover{
  display:grid;
  grid-template-columns:.9fr 1.1fr;
  min-height:330px;
}
.plant-photo{
  width:100%;
  height:100%;
  min-height:330px;
  object-fit:cover;
  background:#dbeadd;
}
.photo-placeholder{
  min-height:330px;
  display:grid;
  place-items:center;
  text-align:center;
  color:var(--green);
  background:linear-gradient(145deg,#ecfdf5,#dbeafe);
  font-size:1.05rem;
  font-weight:800;
  padding:22px;
}
.details{padding:28px}
.badge{
  display:inline-flex;
  padding:7px 11px;
  border-radius:999px;
  color:#166534;
  background:var(--leaf);
  font-weight:900;
  font-size:.78rem;
  text-transform:uppercase;
}
h1{margin:14px 0 4px;color:var(--deep);font-size:clamp(1.7rem,4vw,2.35rem);line-height:1.12}
.scientific{margin:0 0 20px;color:var(--muted);font-style:italic}
.status{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:8px 12px;
  border-radius:9px;
  background:var(--leaf);
  color:#166534;
  font-weight:900;
}
.status::before{
  content:"";
  width:9px;
  height:9px;
  border-radius:50%;
  background:#16a34a;
}
.record{padding:0 28px 28px}
.record-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.field{
  min-height:74px;
  padding:12px 13px;
  border:1px solid var(--line);
  border-radius:10px;
}
.field:nth-child(4n+1){background:var(--sky)}
.field:nth-child(4n+2){background:var(--amber)}
.field:nth-child(4n+3){background:var(--leaf)}
.field:nth-child(4n+4){background:var(--pink)}
.label{
  display:block;
  margin-bottom:4px;
  color:#475569;
  font-size:.75rem;
  font-weight:900;
  text-transform:uppercase;
}
.value{font-weight:800;line-height:1.35}
.note{
  margin:18px 0 0;
  padding:14px;
  border-radius:10px;
  background:#f8fafc;
  color:var(--muted);
  font-size:.92rem;
}
.missing{
  padding:54px 24px;
  text-align:center;
}
.missing h1{font-size:1.55rem}
.missing p{color:var(--muted)}
footer{
  padding:0 14px 28px;
  text-align:center;
  color:var(--muted);
  font-size:.86rem;
}
@media(max-width:700px){
  main{margin:18px auto}
  .cover{grid-template-columns:1fr}
  .plant-photo,.photo-placeholder{min-height:245px;height:245px}
  .details,.record{padding:20px}
  .record-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="mark">X</span>
    <span>Xohopathi<small>Plantation Drive</small></span>
  </div>
</header>

<main>
  <article class="plant-card" id="plantCard" aria-live="polite">
    <div class="missing">
      <p>Loading plant details...</p>
    </div>
  </article>
</main>

<footer>Xohopathi Plantation Drive | A greener campus, one plant at a time.</footer>

<script src="plants-data.js"></script>
<script>
function clean(value){
  return String(value || "").replace(/[&<>"']/g, function(character){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[character];
  });
}

const plantId = new URLSearchParams(window.location.search).get("id");
const plants = Array.isArray(window.XOHOPATHI_PLANTS) ? window.XOHOPATHI_PLANTS : [];
const plant = plants.find(function(item){ return item.id === plantId; });
const card = document.getElementById("plantCard");

if(!plant){
  card.innerHTML = `
    <div class="missing">
      <span class="badge">Xohopathi Plantation Drive</span>
      <h1>Plant record not found</h1>
      <p>Please check the QR code or the Plant ID printed on the label.</p>
    </div>
  `;
}else{
  document.title = plant.plantName + " | Xohopathi Plantation Drive";
  const imageMarkup = plant.photo
    ? `<img class="plant-photo" src="${clean(plant.photo)}" alt="${clean(plant.plantName)}" onerror="this.outerHTML='<div class=&quot;photo-placeholder&quot;>Plant photograph will be updated soon.</div>'">`
    : `<div class="photo-placeholder">Plant photograph<br>will be updated soon.</div>`;
  card.innerHTML = `
    <div class="cover">
      ${imageMarkup}
      <div class="details">
        <span class="badge">Xohopathi Plantation Drive</span>
        <h1>${clean(plant.plantName)}</h1>
        <p class="scientific">${clean(plant.scientificName)}</p>
        <span class="status">${clean(plant.status)}</span>
      </div>
    </div>
    <div class="record">
      <div class="record-grid">
        <div class="field"><span class="label">Plant ID</span><span class="value">${clean(plant.id)}</span></div>
        <div class="field"><span class="label">Donated By</span><span class="value">${clean(plant.donorName)}</span></div>
        <div class="field"><span class="label">Maintained By</span><span class="value">${clean(plant.maintenancePerson)}</span></div>
        <div class="field"><span class="label">Planted On</span><span class="value">${clean(plant.plantationDate)}</span></div>
        <div class="field"><span class="label">Location</span><span class="value">${clean(plant.location)}</span></div>
        <div class="field"><span class="label">Last Updated</span><span class="value">${clean(plant.lastUpdated)}</span></div>
      </div>
      <p class="note">${clean(plant.note)}</p>
    </div>
  `;
}
</script>
</body>
</html>
